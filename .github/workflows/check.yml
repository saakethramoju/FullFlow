name: Check package

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build package
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Sync environment
        run: uv sync

      - name: Build package
        run: uv build

      - name: Import package
        run: uv run python -c "import fullflow; import fullflow.System; import fullflow.Solvers; print('FullFlow import ok')"

      - name: Run tests
        run: uv run pytest