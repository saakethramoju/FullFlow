[project]
name = "fullflow"
version = "0.1.0"
description = "A fluid, thermal, and propulsion network simulation framework."
readme = "README.md"
requires-python = ">=3.11"
license = "GPL-3.0-or-later"

authors = [
    { name = "Saaketh Ramoju", email = "skramoju@gmail.com" }
]

keywords = [
    "fluid",
    "flow",
    "thermodynamics",
    "heat-transfer",
    "rocket",
    "propulsion",
    "simulation",
    "network-analysis",
]

classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Scientific/Engineering",
]

dependencies = [
    "numpy>=2.4.6",
    "rich>=15.0.0",
    "rocketcea>=1.2.3",
    "scipy>=1.17.1",
    "thermoprop>=0.3.3",
]

[project.urls]
Homepage = "https://github.com/saakethramoju/FullFlow"
Repository = "https://github.com/saakethramoju/FullFlow"
Issues = "https://github.com/saakethramoju/FullFlow/issues"

[project.scripts]
fullflow = "fullflow:main"

[build-system]
requires = ["uv_build>=0.11.18,<0.12.0"]
build-backend = "uv_build"