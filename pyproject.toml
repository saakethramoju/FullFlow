[project]
name = "fullflow"
version = "0.1.0"
description = "A fluid, thermal, and propulsion network simulation framework."
readme = "README.md"
authors = [
    { name = "Saaketh Ramoju", email = "rsaaketh@icloud.com" }
]
requires-python = ">=3.11"
dependencies = [
    "numpy>=2.4.6",
    "rich>=15.0.0",
    "rocketcea>=1.2.3",
    "scipy>=1.17.1",
    "thermoprop>=0.3.3",
]

[project.scripts]
fullflow = "fullflow:main"

[build-system]
requires = ["uv_build>=0.11.18,<0.12.0"]
build-backend = "uv_build"
